<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Support | Granite Ridge Supply</title>
  <meta name="description" content="Contact Granite Ridge Supply support." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>
  <div class="bg-glow" aria-hidden="true"></div>

  <header class="site-header compact">
    <div class="container header-inner">
      <a class="brand" href="index.html">
        <span class="brand-mark">GR</span>
        <span class="brand-text">
          <span class="brand-name">Granite Ridge Supply</span>
          <span class="brand-tag">Utility • Outdoor • EDC</span>
        </span>
      </a>

      <nav class="nav">
        <a href="shop.html">Shop</a>
        <a href="about.html">About</a>
        <a href="contact.html" class="active">Support</a>
      </nav>

      <div class="header-actions">
        <button class="icon-btn" id="themeBtn" title="Toggle theme" aria-label="Toggle theme">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 18a6 6 0 1 1 0-12 6 6 0 0 1 0 12Zm0-16h0Zm0 20h0ZM4 12h0Zm16 0h0ZM5.6 5.6h0Zm12.8 12.8h0ZM5.6 18.4h0Zm12.8-12.8h0"/></svg>
        </button>
      </div>
    </div>
  </header>

  <main class="section">
    <div class="container narrow">
      <h1 class="page-title">Support</h1>
      <p class="muted lead">Questions about an order, shipping, or a product? Send a message below.</p>

      <div class="card">
        <form class="stack" onsubmit="return false;">
          <label class="field">
            <span>Name</span>
            <input type="text" placeholder="Your name" />
          </label>
          <label class="field">
            <span>Email</span>
            <input type="email" placeholder="you@email.com" />
          </label>
          <label class="field">
            <span>Message</span>
            <textarea rows="5" placeholder="How can we help?"></textarea>
          </label>
          <button class="btn primary" type="button" id="sendBtn">Send message</button>
          <small class="muted" id="sendMsg"></small>
        </form>
      </div>

      <div class="notice">
        Replace the email/submit flow with your backend (or Shopify contact form) when you go live.
      </div>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container footer-bottom">
      <small class="muted">© 2026 Granite Ridge Supply</small>
    </div>
  </footer>

  <script src="assets/js/main.js"></script>
</body>
</html>
